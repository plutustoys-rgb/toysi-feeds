name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this pull request the same way a manual independent code
            audit of this repository would, focused on three things:

            1. Bugs — logic errors, edge cases, incorrect assumptions,
               anything that would misbehave on real data (this project
               parses/generates supplier XML feeds and calls external APIs
               like Toysi and Nova Poshta, so pay attention to string
               matching, encoding, and API request/response handling).
            2. Secrets — hardcoded API keys, tokens, passwords, IBANs, or
               personal data (addresses, phone numbers, tax IDs) that
               should instead come from environment variables / .env.
            3. Git hygiene — large binary/generated files being committed
               (e.g. feeds/*.xml should never be tracked, only published to
               the feed-data branch), missing .gitignore entries, or other
               changes that would bloat repository history.

            Note: The PR branch is already checked out in the current
            working directory.

            Use `gh pr comment` for a top-level summary of findings.
            Use `mcp__github_inline_comment__create_inline_comment` (with
            `confirmed: true`) to point out specific lines with issues.
            Only post GitHub comments — don't submit review text as chat
            messages. If you find nothing worth flagging in one of the three
            categories, say so briefly rather than omitting it.

          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
