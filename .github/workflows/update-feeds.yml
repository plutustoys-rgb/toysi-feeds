name: Update Toysi feeds

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch: {}

env:
  FEED_BRANCH: feed-data

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TOYSI_API_KEY: ${{ secrets.TOYSI_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python generate_rozetka_feed.py
      - run: python generate_prom_feed.py
      - run: python generate_prom_feed_top.py

      # Публікуємо тільки feeds/*.xml в окрему гілку feed-data одним коммітом,
      # що щоразу перезаписує попередній (force-push). Це не дає git-історії
      # рости на кожен запуск (кожні 4 години) — інакше репозиторій накопичував
      # би десятки МБ щодня назавжди. Гілка main лишається чистою — тільки код.
      - name: Publish feeds to ${{ env.FEED_BRANCH }} (force-push, no history)
        run: |
          git config user.name "feed-bot"
          git config user.email "feed-bot@users.noreply.github.com"
          git checkout --orphan "$FEED_BRANCH-tmp"
          git rm -r --cached . > /dev/null
          git add feeds/rozetka_feed.xml feeds/prom_feed.xml feeds/prom_feed_top.xml
          git commit -m "Feed update $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push --force origin "$FEED_BRANCH-tmp:$FEED_BRANCH"
