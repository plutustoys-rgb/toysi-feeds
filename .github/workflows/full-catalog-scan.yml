name: Full catalog competitor scan (one-time)

# Ручний workflow_dispatch НАВМИСНО, не cron (рішення власника, 2026-07-13):
# скан 17 888 SKU повного каталогу Toysi (stock>0, не уцінка — НАВМИСНО
# без попередньої фільтрації за маржею, див. докстрінг скрипта для повної
# стратегії), розтягнутий на ~6 днів по ~3000 SKU/день — консервативний
# темп проти невідомого ризику rate-limit на реверс-інженерний
# GraphQL-пошук Prom + звичайні сторінки товару для verify_competitor_
# really_available() (17-30x звичайного добового навантаження щоденного
# репрайсера). Тригериться АГЕНТОМ (не власником вручну щоразу) через
# заплановану рутину, яка також перевіряє конфлікт з щоденним циклом
# репрайсера перед кожним пакетом.
#
# НІКОЛИ не --apply — full_catalog_competitor_scan.py лише читає/рахує,
# не змінює жодної ціни в Prom. Див. докстрінг скрипта для повного
# обґрунтування обсягу/безпеки.
on:
  workflow_dispatch:
    inputs:
      batch_size:
        description: "Скільки ще не сканованих SKU обробити цим прогоном (дефолт 3000, ~126 хв з verify_competitor_really_available())"
        required: false
        default: "3000"
        type: string

env:
  # ОКРЕМА гілка від feed-data (не спільна!) — публікація на feed-data тут
  # означала б force-push БЕЗ feeds/*.xml і prom_competitor_price_state.json
  # (кожен force-push у update-feeds.yml замінює ВЕСЬ вміст гілки), що
  # знищило б живі фіди й стан репрайсера. Цей скан — суто інформаційний
  # і не стосується публічних фідів, тож повністю ізольована гілка.
  SCAN_BRANCH: full-catalog-scan-data

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 180  # запас проти ~75 хв очікуваних для 3000 SKU; захист від зависання
    env:
      TOYSI_API_KEY: ${{ secrets.TOYSI_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt

      - name: Restore full_catalog_scan_state.json from ${{ env.SCAN_BRANCH }}
        run: |
          git fetch origin "$SCAN_BRANCH" 2>/dev/null || true
          git show "origin/$SCAN_BRANCH:full_catalog_scan_state.json" > full_catalog_scan_state.json 2>/dev/null \
            || echo '{}' > full_catalog_scan_state.json

      - name: Run next scan batch
        run: python full_catalog_competitor_scan.py --batch-size "${{ github.event.inputs.batch_size }}"

      - name: Publish updated state to ${{ env.SCAN_BRANCH }} (force-push, no history)
        run: |
          git config user.name "feed-bot"
          git config user.email "feed-bot@users.noreply.github.com"
          git checkout --orphan "$SCAN_BRANCH-tmp"
          git rm -r --cached . > /dev/null 2>&1 || true
          git add -f full_catalog_scan_state.json
          git commit -m "Full catalog scan progress $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push --force origin "$SCAN_BRANCH-tmp:$SCAN_BRANCH"
