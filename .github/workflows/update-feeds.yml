name: Update Toysi feeds

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:
    inputs:
      apply:
        description: "Репрайсер: реально змінювати ціни в Prom (--apply). false = dry-run, лише звіт/лог, без реальних наслідків. Не впливає на планові (cron) запуски — ті завжди --apply."
        required: false
        default: "true"
        type: boolean
      force:
        description: "Репрайсер: обійти гейт 'повний прогін вже був нещодавно' (--force). Шлях відновлення через UI Actions, без SSH/ручного редагування стану на feed-data."
        required: false
        default: "false"
        type: boolean

env:
  FEED_BRANCH: feed-data

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TOYSI_API_KEY: ${{ secrets.TOYSI_API_KEY }}
      PROM_API_KEY: ${{ secrets.PROM_API_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt

      # prom_competitor_pricer.py (мігровано сюди з VPS-таймера 2026-07-13 —
      # інакше він писав спільний стан на VPS, а generate_prom_feed.py читав
      # його тут, на окремому ефемерному runner'і без спільної файлової
      # системи, тож щойно застосована конкурентна ціна ніколи не доходила
      # до фіда) пише/читає prom_competitor_price_state.json — відновлюємо
      # його з попереднього коміту feed-data перед запуском, інакше кожен
      # прогін стартував би з чистого стану й губив усі раніше застосовані
      # ціни та мітку last_full_run (гейт "не частіше ~20 год").
      - name: Restore prom_competitor_price_state.json from ${{ env.FEED_BRANCH }}
        run: |
          git fetch origin "$FEED_BRANCH" 2>/dev/null || true
          git show "origin/$FEED_BRANCH:prom_competitor_price_state.json" > prom_competitor_price_state.json 2>/dev/null \
            || echo '{}' > prom_competitor_price_state.json

      # continue-on-error: цей крок реально змінює ціни в Prom через API
      # (--apply) і опитує реверс-інженерний GraphQL-пошук — обидва є крихкими
      # зовнішніми залежностями. Збій тут не повинен зупиняти генерацію й
      # публікацію самих фідів (generate_*.py), які є основною метою workflow.
      # Власний гейт всередині скрипта (MIN_FULL_RUN_INTERVAL_HOURS) не дає
      # йому робити повний прогін частіше приблизно раз на добу, попри те, що
      # сам workflow тепер тригериться щочотири години.
      # github.event.inputs.* лише для workflow_dispatch (порожній рядок для
      # cron) — тому планові прогони завжди потрапляють у гілку "!= false",
      # тобто --apply без --force, і лише ручний dispatch може відхилятись.
      - name: Run competitor repricer (Prom)
        continue-on-error: true
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.apply }}" != "false" ]; then ARGS="$ARGS --apply"; fi
          if [ "${{ github.event.inputs.force }}" = "true" ]; then ARGS="$ARGS --force"; fi
          python prom_competitor_pricer.py $ARGS

      - run: python generate_rozetka_feed.py
      - run: python generate_prom_feed.py
      - run: python generate_prom_feed_top.py

      # Явна перевірка перед git-операціями: якщо TOYSI_API_KEY відсутній/невалідний
      # або каталог Toysi порожній, generate_*.py свідомо не пишуть файл (design decision
      # в самих скриптах) — раніше це тихо маскувалось старими закомодженими копіями
      # feeds/*.xml на master, тепер (після git-гігієни, коміт 72ad9fd) фолбеку немає,
      # тож без цієї перевірки помилка виглядає як незрозумілий git pathspec-фейл.
      - name: Verify feeds were generated
        run: |
          for f in feeds/rozetka_feed.xml feeds/prom_feed.xml feeds/prom_feed_top.xml; do
            if [ ! -s "$f" ]; then
              echo "::error::$f не згенеровано (порожній файл або відсутній) — ймовірно, TOYSI_API_KEY secret відсутній/невалідний, або Toysi API недоступний. Перевір Settings -> Secrets and variables -> Actions."
              exit 1
            fi
          done

      # Публікуємо тільки feeds/*.xml в окрему гілку feed-data одним коммітом,
      # що щоразу перезаписує попередній (force-push). Це не дає git-історії
      # рости на кожен запуск (кожні 4 години) — інакше репозиторій накопичував
      # би десятки МБ щодня назавжди. Гілка main лишається чистою — тільки код.
      #
      # 2026-07-10: prom_feed.xml виріс до 106+ МБ (жорсткий ліміт GitHub —
      # 100 МБ на файл). GitHub відхиляє ВЕСЬ пуш як одну транзакцію через
      # перевищення. Перша версія цього фолбеку (комміт 6385d7e) рятувала
      # лише prom_feed_top.xml — але це МОВЧКИ й НАЗАВЖДИ (щоразу, кожні
      # 4 години, без жодної помітної помилки) залишало rozetka_feed.xml
      # ніколи не опублікованим на feed-data, хоча сам він (~60 МБ, 2026-07-12)
      # добре вкладається в ліміт і лише "потерпав" від того, що йшов в
      # ОДНОМУ атомарному коміті з завеликим prom_feed.xml. Виявлено
      # 2026-07-12 під час підготовки реєстрації Rozetka (кабінет чекав на
      # публічний URL фіда, а feed-data branch увесь цей час містив лише
      # prom_feed_top.xml). Тепер — три рівні спроб, від повного набору до
      # мінімального гарантованого: кожен наступний прибирає найбільший файл,
      # що міг спричинити відмову, замість одразу викидати ВСЕ, крім
      # top-970. Сама проблема розміру prom_feed.xml лишається відкритою —
      # потрібне окреме рішення (Git LFS чи інший хостинг), не вирішено тут.
      - name: Publish feeds to ${{ env.FEED_BRANCH }} (force-push, no history)
        run: |
          git config user.name "feed-bot"
          git config user.email "feed-bot@users.noreply.github.com"

          publish_attempt() {
            local branch_suffix="$1"; shift
            local commit_msg="$1"; shift
            git checkout --orphan "$FEED_BRANCH-$branch_suffix"
            git rm -r --cached . > /dev/null 2>&1 || true
            # -f: feeds/*.xml навмисно в .gitignore для master (щоб не роздувати її
            # історію), але саме ці файли й мають бути закомічені сюди, на feed-data —
            # без -f git add мовчки відмовляється додавати файли, що збігаються з .gitignore.
            git add -f "$@"
            git commit -m "$commit_msg"
            git push --force origin "$FEED_BRANCH-$branch_suffix:$FEED_BRANCH"
          }

          # prom_competitor_price_state.json — невеликий JSON, додаємо в усі три
          # рівні спроб (навіть у мінімальний фолбек), бо його відсутність тут
          # означає повну втрату стану репрайсера (state.json не потрапить у
          # feed-data і наступний прогін почне з нуля, ігноруючи гейт
          # MIN_FULL_RUN_INTERVAL_HOURS і всі щойно застосовані ціни).
          if publish_attempt tmp-full "Feed update $(date -u +'%Y-%m-%d %H:%M UTC')" \
              feeds/rozetka_feed.xml feeds/prom_feed.xml feeds/prom_feed_top.xml prom_competitor_price_state.json; then
            echo "Усі 3 фіди опубліковано."
          elif publish_attempt tmp-no-prom "Feed update (без prom_feed.xml, ймовірно >100МБ) $(date -u +'%Y-%m-%d %H:%M UTC')" \
              feeds/rozetka_feed.xml feeds/prom_feed_top.xml prom_competitor_price_state.json; then
            echo "::warning::Повний пуш відхилено (ймовірно, prom_feed.xml перевищує 100 МБ) — опубліковано rozetka_feed.xml + prom_feed_top.xml без нього."
          else
            echo "::warning::Пуш rozetka_feed.xml + prom_feed_top.xml теж відхилено — публікуємо ОКРЕМО лише prom_feed_top.xml (малий, критичний для імпорту топ-970 в Prom), щоб він не застарів через провал інших файлів."
            publish_attempt fallback "Feed update (лише top-970, фолбек через розмір інших фідів) $(date -u +'%Y-%m-%d %H:%M UTC')" \
              feeds/prom_feed_top.xml prom_competitor_price_state.json
          fi
