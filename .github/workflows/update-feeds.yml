name: Update Toysi feeds

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch: {}

env:
  FEED_BRANCH: feed-data

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TOYSI_API_KEY: ${{ secrets.TOYSI_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python generate_rozetka_feed.py
      - run: python generate_prom_feed.py
      - run: python generate_prom_feed_top.py

      # Явна перевірка перед git-операціями: якщо TOYSI_API_KEY відсутній/невалідний
      # або каталог Toysi порожній, generate_*.py свідомо не пишуть файл (design decision
      # в самих скриптах) — раніше це тихо маскувалось старими закомодженими копіями
      # feeds/*.xml на master, тепер (після git-гігієни, коміт 72ad9fd) фолбеку немає,
      # тож без цієї перевірки помилка виглядає як незрозумілий git pathspec-фейл.
      - name: Verify feeds were generated
        run: |
          for f in feeds/rozetka_feed.xml feeds/prom_feed.xml feeds/prom_feed_top.xml; do
            if [ ! -s "$f" ]; then
              echo "::error::$f не згенеровано (порожній файл або відсутній) — ймовірно, TOYSI_API_KEY secret відсутній/невалідний, або Toysi API недоступний. Перевір Settings -> Secrets and variables -> Actions."
              exit 1
            fi
          done

      # Публікуємо тільки feeds/*.xml в окрему гілку feed-data одним коммітом,
      # що щоразу перезаписує попередній (force-push). Це не дає git-історії
      # рости на кожен запуск (кожні 4 години) — інакше репозиторій накопичував
      # би десятки МБ щодня назавжди. Гілка main лишається чистою — тільки код.
      #
      # 2026-07-10: prom_feed.xml виріс до 106+ МБ (жорсткий ліміт GitHub —
      # 100 МБ на файл), rozetka_feed.xml — до 57+ МБ (лише попередження, під
      # лімітом). GitHub відхиляє ВЕСЬ пуш як одну транзакцію через
      # перевищення — це МОВЧКИ блокувало публікацію prom_feed_top.xml
      # (~2 МБ, ніколи не наближається до ліміту) щоразу, коли великі фіди
      # перевищували ліміт, з 2026-07-08 (виявлено під час підготовки
      # реального імпорту топ-970 в Prom — публічний URL показував дані
      # тижневої давності). Фолбек нижче: якщо повний пуш (усі 3 файли)
      # відхилено — публікуємо ОКРЕМИМ пушем лише prom_feed_top.xml, щоб
      # малий критичний файл не застарівав через провал великих. Сама
      # проблема з розміром prom_feed.xml/rozetka_feed.xml (понад ліміт)
      # лишається відкритою — потрібне окреме рішення (Git LFS чи інший
      # хостинг), не вирішено тут.
      - name: Publish feeds to ${{ env.FEED_BRANCH }} (force-push, no history)
        run: |
          git config user.name "feed-bot"
          git config user.email "feed-bot@users.noreply.github.com"
          git checkout --orphan "$FEED_BRANCH-tmp"
          git rm -r --cached . > /dev/null
          # -f: feeds/*.xml навмисно в .gitignore для master (щоб не роздувати її історію),
          # але саме ці файли й мають бути закомічені сюди, на feed-data — без -f git add
          # мовчки відмовляється додавати файли, що збігаються з .gitignore.
          git add -f feeds/rozetka_feed.xml feeds/prom_feed.xml feeds/prom_feed_top.xml
          git commit -m "Feed update $(date -u +'%Y-%m-%d %H:%M UTC')"
          if git push --force origin "$FEED_BRANCH-tmp:$FEED_BRANCH"; then
            echo "Усі 3 фіди опубліковано."
          else
            echo "::warning::Повний пуш (усі 3 фіди) відхилено — ймовірно, prom_feed.xml і/чи rozetka_feed.xml перевищують ліміт розміру GitHub (100 МБ/файл). Публікуємо ОКРЕМО лише prom_feed_top.xml (малий, критичний для імпорту топ-970 в Prom), щоб він не застарів через провал інших файлів. rozetka_feed.xml/prom_feed.xml лишаються застарілими до окремого рішення проблеми розміру."
            git checkout --orphan "$FEED_BRANCH-fallback"
            git rm -r --cached . > /dev/null 2>&1 || true
            git add -f feeds/prom_feed_top.xml
            git commit -m "Feed update (лише top-970, фолбек через розмір інших фідів) $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push --force origin "$FEED_BRANCH-fallback:$FEED_BRANCH"
          fi
