name: Update Toysi feeds

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:
    inputs:
      apply:
        description: "Репрайсер: реально змінювати ціни в Prom (--apply). false = dry-run, лише звіт/лог, без реальних наслідків. Не впливає на планові (cron) запуски — ті завжди --apply."
        required: false
        default: "true"
        type: boolean
      force:
        description: "Репрайсер: обійти гейт 'повний прогін вже був нещодавно' (--force). Шлях відновлення через UI Actions, без SSH/ручного редагування стану на feed-data."
        required: false
        default: "false"
        type: boolean

env:
  FEED_BRANCH: feed-data

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TOYSI_API_KEY: ${{ secrets.TOYSI_API_KEY }}
      # Виправлено (незалежне рев'ю PR #39, раунд 2): generate_google_feed.py
      # (крок нижче) викликає fetch_prom_products(), якому потрібен цей
      # ключ — живо підтверджено 401 Unauthorized без нього. Секрет
      # зареєстровано в Settings -> Secrets and variables -> Actions
      # 2026-07-12 (раніше існував лише в .env на VPS, ніколи як GitHub
      # secret). Той самий секрет тепер потрібен і prom_competitor_pricer.py.
      PROM_API_KEY: ${{ secrets.PROM_API_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt

      # prom_competitor_pricer.py (мігровано сюди з VPS-таймера 2026-07-13 —
      # інакше він писав спільний стан на VPS, а generate_prom_feed.py читав
      # його тут, на окремому ефемерному runner'і без спільної файлової
      # системи, тож щойно застосована конкурентна ціна ніколи не доходила
      # до фіда) пише/читає prom_competitor_price_state.json — відновлюємо
      # його з попереднього коміту feed-data перед запуском, інакше кожен
      # прогін стартував би з чистого стану й губив усі раніше застосовані
      # ціни та мітку last_full_run (гейт "не частіше ~20 год").
      - name: Restore prom_competitor_price_state.json from ${{ env.FEED_BRANCH }}
        run: |
          git fetch origin "$FEED_BRANCH" 2>/dev/null || true
          git show "origin/$FEED_BRANCH:prom_competitor_price_state.json" > prom_competitor_price_state.json 2>/dev/null \
            || echo '{}' > prom_competitor_price_state.json

      # Виправлено (незалежне рев'ю PR #39): раніше generate_google_feed.py
      # не викликався в жодному workflow, тож own_product_links_cache.json
      # ніколи не існував на CI, і <url> в Rozetka-фіді назавжди лишався
      # порожнім. Steps одного job'у діляться файловою системою раннера —
      # цього достатньо, щоб наступні кроки прочитали щойно записаний кеш;
      # НЕ комітимо кеш у git (той самий підхід, що й для feeds/*.xml —
      # регенерується заново щоразу, а не зберігається між прогонами).
      # continue-on-error: <url> — необов'язковий тег, тож збій цього кроку
      # (напр. reverse-engineered пошуковий ендпоінт Prom тимчасово
      # недоступний) не повинен блокувати генерацію решти фідів, які раніше
      # чудово працювали й без нього.
      #
      # ВИПРАВЛЕНО (незалежне рев'ю PR #53, критична знахідка): цей крок
      # ПЕРЕНЕСЕНО СЮДИ, ПЕРЕД репрайсером — раніше йшов ПІСЛЯ нього, і
      # prom_competitor_pricer.py (buyBox-джерело конкурента, PR #53)
      # завжди отримував порожній own_product_links_cache.json (файл
      # фізично ще не існував на диску в момент його виконання), тож
      # buyBox НІКОЛИ не активувався в реальному CI — 100% прогонів мовчки
      # йшли на старий, менш надійний пошуковий fallback, попри те, що код
      # і локальні тести PR #53 були коректними. generate_google_feed.py
      # не залежить від результатів репрайсера чи від
      # prom_competitor_price_state.json, тож цей обмін місцями нічого
      # іншого не ламає.
      - name: Refresh own-product-link cache for Rozetka <url> tag and buyBox competitor lookup (best-effort)
        continue-on-error: true
        run: python generate_google_feed.py

      # continue-on-error: цей крок реально змінює ціни в Prom через API
      # (--apply) і опитує реверс-інженерний GraphQL-пошук — обидва є крихкими
      # зовнішніми залежностями. Збій тут не повинен зупиняти генерацію й
      # публікацію самих фідів (generate_*.py), які є основною метою workflow.
      # Власний гейт всередині скрипта (MIN_FULL_RUN_INTERVAL_HOURS) не дає
      # йому робити повний прогін частіше приблизно раз на добу, попри те, що
      # сам workflow тепер тригериться щочотири години.
      # github.event.inputs.* лише для workflow_dispatch (порожній рядок для
      # cron) — тому планові прогони завжди потрапляють у гілку "!= false",
      # тобто --apply без --force, і лише ручний dispatch може відхилятись.
      - name: Run competitor repricer (Prom)
        continue-on-error: true
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.apply }}" != "false" ]; then ARGS="$ARGS --apply"; fi
          if [ "${{ github.event.inputs.force }}" = "true" ]; then ARGS="$ARGS --force"; fi
          python prom_competitor_pricer.py $ARGS

      # Фолбек на випадок, якщо репрайсер аварійно завершився ДО першого
      # виклику write_pricer_summary() (напр. не встиг навіть завантажити
      # PROM_API_KEY) — гарантує, що файл існує до кроку публікації, той
      # самий підхід, що й фолбек '{}' у кроці відновлення стану вище.
      - name: Ensure prom_competitor_pricer_summary.md exists (best-effort fallback)
        if: always()
        run: |
          if [ ! -s prom_competitor_pricer_summary.md ]; then
            printf '# Репрайсер конкурентів Prom — стислий підсумок (перезаписується щоразу)\n\nОновлено: %s\n⚠ Файл не згенеровано — репрайсер, ймовірно, аварійно завершився до першого запису підсумку.\n' \
              "$(date -u +'%Y-%m-%d %H:%M UTC')" > prom_competitor_pricer_summary.md
          fi

      - run: python generate_rozetka_feed.py
      - run: python generate_prom_feed.py
      - run: python generate_prom_feed_top.py

      # Явна перевірка перед git-операціями: якщо TOYSI_API_KEY відсутній/невалідний
      # або каталог Toysi порожній, generate_*.py свідомо не пишуть файл (design decision
      # в самих скриптах) — раніше це тихо маскувалось старими закомодженими копіями
      # feeds/*.xml на master, тепер (після git-гігієни, коміт 72ad9fd) фолбеку немає,
      # тож без цієї перевірки помилка виглядає як незрозумілий git pathspec-фейл.
      - name: Verify feeds were generated
        run: |
          for f in feeds/rozetka_feed.xml feeds/prom_feed.xml feeds/prom_feed_top.xml; do
            if [ ! -s "$f" ]; then
              echo "::error::$f не згенеровано (порожній файл або відсутній) — ймовірно, TOYSI_API_KEY secret відсутній/невалідний, або Toysi API недоступний. Перевір Settings -> Secrets and variables -> Actions."
              exit 1
            fi
          done

      # ВИПРАВЛЕНО 2026-07-14: prom_feed.xml (повний каталог, 106+ МБ) остаточно
      # перенесено з git на VPS-хостинг — GitHub-як-хостинг для цього файлу
      # вичерпав себе (жорсткий ліміт 100 МБ/файл, публікація падала щоразу з
      # 13.07, див. видалений нижче трирівневий фолбек). SSH-ключ (ТІЛЬКИ
      # rsync у /opt/plutustoys/feeds/, обмежено через rrsync — навіть при
      # витоку ключа неможливо виконати довільну команду на VPS) — новий
      # секрет FEED_DEPLOY_SSH_KEY, зареєстрований 2026-07-14. continue-on-error:
      # VPS/мережа — зовнішня залежність, збій тут не повинен блокувати
      # публікацію rozetka_feed.xml/prom_feed_top.xml нижче, які й далі йдуть
      # у git (обидва помітно менші за 100 МБ, ще жоден пуш ними не впав).
      - name: Upload prom_feed.xml to VPS (permanent hosting)
        continue-on-error: true
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.FEED_DEPLOY_SSH_KEY }}" > ~/.ssh/feed_deploy_key
          chmod 600 ~/.ssh/feed_deploy_key
          ssh-keyscan -H "${{ secrets.FEED_DEPLOY_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null
          # "root@" ОБОВ'ЯЗКОВИЙ тут: без явного користувача rsync/ssh
          # підставляє ім'я ПОТОЧНОГО користувача на раннері (на ubuntu-latest
          # це буквально "runner") як SSH-логін — VPS такого користувача не
          # має, і автентифікація падає з "Invalid user runner" (живо
          # підтверджено в /var/log/auth.log на VPS during діагностики
          # 2026-07-14). Ключ обмежений через rrsync у authorized_keys саме
          # під root — той самий обліковий запис, під яким живе
          # /opt/plutustoys/feeds, тож root@ тут відповідає реальному
          # обмеженню, не є зайвим підвищенням прав.
          rsync -avz --timeout=180 \
            -e "ssh -i ~/.ssh/feed_deploy_key -o StrictHostKeyChecking=yes -o UserKnownHostsFile=~/.ssh/known_hosts" \
            feeds/prom_feed.xml "root@${{ secrets.FEED_DEPLOY_HOST }}:prom_feed.xml"

      # Публікуємо rozetka_feed.xml + prom_feed_top.xml в окрему гілку feed-data
      # одним коммітом, що щоразу перезаписує попередній (force-push). Це не
      # дає git-історії рости на кожен запуск (кожні 4 години) — інакше
      # репозиторій накопичував би десятки МБ щодня назавжди. Гілка main
      # лишається чистою — тільки код.
      #
      # ВИПРАВЛЕНО 2026-07-14: prom_feed.xml (106+ МБ, понад жорсткий ліміт
      # GitHub 100 МБ/файл) прибрано з цієї публікації повністю — окремий крок
      # вище вивантажує його на постійний VPS-хостинг замість git. Трирівневий
      # фолбек (2026-07-12, коміт 6385d7e і далі), що existed саме через
      # ризик перевищення ліміту цим файлом, більше не потрібен: без
      # prom_feed.xml сумарний розмір цієї публікації — одноразовий, надійно
      # закладений під ліміт, жодного окремого файлу біля межі 100 МБ немає.
      - name: Publish feeds to ${{ env.FEED_BRANCH }} (force-push, no history)
        run: |
          git config user.name "feed-bot"
          git config user.email "feed-bot@users.noreply.github.com"
          git checkout --orphan "$FEED_BRANCH-tmp"
          git rm -r --cached . > /dev/null 2>&1 || true
          # -f: feeds/*.xml навмисно в .gitignore для master (щоб не роздувати її
          # історію), але саме ці файли й мають бути закомічені сюди, на feed-data —
          # без -f git add мовчки відмовляється додавати файли, що збігаються з .gitignore.
          git add -f feeds/rozetka_feed.xml feeds/prom_feed_top.xml prom_competitor_price_state.json
          git commit -m "Feed update $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push --force origin "$FEED_BRANCH-tmp:$FEED_BRANCH"

      # Приватний артефакт (не публічна гілка feed-data): prom_competitor_
      # pricer_summary.md містить стратегічні лічильники репрайсера
      # (перевірено/скориговано/delist/ритм гейту) — той самий тип сигналу
      # про ціноутворення, який раніше вирішили не публікувати відкрито.
      # Доступ лише через автентифікований `gh run download` або UI Actions
      # власника, ніколи публічно. retention 14 днів — це лише "останній
      # знімок", попередні прогони не потрібні довше цього.
      - name: Upload pricer summary as private artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prom-competitor-pricer-summary
          path: prom_competitor_pricer_summary.md
          retention-days: 14
