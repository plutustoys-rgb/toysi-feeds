name: Update Toysi feeds

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:
    inputs:
      apply:
        description: "Репрайсер: реально змінювати ціни в Prom (--apply). false = dry-run, лише звіт/лог, без реальних наслідків. Не впливає на планові (cron) запуски — ті завжди --apply."
        required: false
        default: "true"
        type: boolean
      force:
        description: "Репрайсер: обійти гейт 'повний прогін вже був нещодавно' (--force). Шлях відновлення через UI Actions, без SSH/ручного редагування стану на feed-data."
        required: false
        default: "false"
        type: boolean
      force_circuit_breaker:
        description: "Репрайсер: обійти circuit breaker (--force-circuit-breaker). Використовувати ЛИШЕ для свідомо очікуваного разового стрибка (напр. перший прогін після зміни самої формули/правила ціноутворення) — НЕ залишати true за замовчуванням, інакше breaker перестає захищати від справжніх аномалій. Не впливає на планові (cron) запуски — ті ніколи не передають цей прапорець."
        required: false
        default: "false"
        type: boolean

env:
  FEED_BRANCH: feed-data

# ДОДАНО (2026-07-19, живий інцидент — code_report_2026-07-19_pt2.md):
# forced workflow_dispatch-прогін (29677266900) і звичайний scheduled-
# прогін виконувались ОДНОЧАСНО (перекриття ~30 хв) — кожен незалежно
# fetch'ив prom_competitor_price_state.json на СВОЄМУ старті й
# force-push'ив свою локальну копію наприкінці ("Publish feeds"
# нижче), тож той, хто завершився ПІЗНІШЕ, стер роботу того, хто
# завершився РАНІШЕ, навіть якщо сам нічого не змінював (гейт "повний
# прогін вже був" лише пропускає repricer-крок, не решту job'у).
# Наслідок: усі 722 delisted-позначки того прогону обнулились,
# Prom-імпорт відновив усі 722 неконкурентні товари як живі.
#
# concurrency-група ставить ДРУГИЙ запуск у ЧЕРГУ (чекає завершення
# першого), а не скасовує його (cancel-in-progress: false — форсований
# прогін не повинен обриватись через щойно прибулий плановий тригер) —
# усуває саму МОЖЛИВІСТЬ двох одночасних job'ів, що перезаписують той
# самий файл стану, замість того щоб намагатись зливати стан заднім
# числом після факту.
concurrency:
  group: update-feeds
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TOYSI_API_KEY: ${{ secrets.TOYSI_API_KEY }}
      # Виправлено (незалежне рев'ю PR #39, раунд 2): generate_google_feed.py
      # (крок нижче) викликає fetch_prom_products(), якому потрібен цей
      # ключ — живо підтверджено 401 Unauthorized без нього. Секрет
      # зареєстровано в Settings -> Secrets and variables -> Actions
      # 2026-07-12 (раніше існував лише в .env на VPS, ніколи як GitHub
      # secret). Той самий секрет тепер потрібен і prom_competitor_pricer.py.
      PROM_API_KEY: ${{ secrets.PROM_API_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt

      # prom_competitor_pricer.py (мігровано сюди з VPS-таймера 2026-07-13 —
      # інакше він писав спільний стан на VPS, а generate_prom_feed.py читав
      # його тут, на окремому ефемерному runner'і без спільної файлової
      # системи, тож щойно застосована конкурентна ціна ніколи не доходила
      # до фіда) пише/читає prom_competitor_price_state.json — відновлюємо
      # його з попереднього коміту feed-data перед запуском, інакше кожен
      # прогін стартував би з чистого стану й губив усі раніше застосовані
      # ціни та мітку last_full_run (гейт "не частіше ~20 год").
      - name: Restore prom_competitor_price_state.json from ${{ env.FEED_BRANCH }}
        run: |
          git fetch origin "$FEED_BRANCH" 2>/dev/null || true
          git show "origin/$FEED_BRANCH:prom_competitor_price_state.json" > prom_competitor_price_state.json 2>/dev/null \
            || echo '{}' > prom_competitor_price_state.json

      # ВИПРАВЛЕНО (2026-07-16, root-cause SKU 299318/299320/299321/249158 у
      # "Видалені з прайсу" на Rozetka): rozetka_feed_membership_state.json
      # пам'ятає, які offer_id вже були в куруваному відборі Rozetka, щоб
      # тимчасово (grace-період) тримати available="false" замість того,
      # щоб офер зникав із фіда цілком, щойно stock=0 в Toysi. Той самий
      # round-trip через feed-data, що й для prom_competitor_price_state.json
      # вище — інакше кожен прогін на ефемерному runner'і стартував би з
      # порожнього стану й carry-forward ніколи б не спрацював насправді.
      - name: Restore rozetka_feed_membership_state.json from ${{ env.FEED_BRANCH }}
        run: |
          git show "origin/$FEED_BRANCH:rozetka_feed_membership_state.json" > rozetka_feed_membership_state.json 2>/dev/null \
            || echo '{}' > rozetka_feed_membership_state.json

      # ДОДАНО (2026-07-16, задача власниці — full_catalog_competitor_scan.py
      # має системно впливати на топ-970, не лишатись окремим інформаційним
      # скриптом): full_catalog_scan_state.json пишеться лише на VPS (там
      # виконується нічний скан, окремий систем-таймер) — цей крок читає
      # НАЙСВІЖІШУ версію з окремої гілки scan-state-data, куди VPS сам
      # публікує стан після кожного нічного прогону (publish_scan_state.sh,
      # власний deploy-ключ ЛИШЕ на VPS, обмежений записом у цей репозиторій
      # — на боці GH Actions жодного нового секрету не додано, це звичайний
      # публічний git fetch). ОКРЕМА гілка від feed-data навмисно — щоб два
      # незалежні публікатори (ця гілка з VPS, feed-data з цього job'у) не
      # затирали вміст одне одного своїм force-push без історії.
      # continue-on-error: якщо гілки ще нема (перший запуск до першого
      # нічного скану) чи VPS-публікація тимчасово не вдалась — не має
      # блокувати генерацію фідів, select_top_items() коректно працює й
      # без цього файлу (наївна оцінка маржі, як і раніше).
      - name: Restore full_catalog_scan_state.json from scan-state-data (VPS-published)
        continue-on-error: true
        run: |
          git fetch origin scan-state-data 2>/dev/null || true
          git show "origin/scan-state-data:full_catalog_scan_state.json" > full_catalog_scan_state.json 2>/dev/null \
            || echo '{}' > full_catalog_scan_state.json

      # Виправлено (незалежне рев'ю PR #39): раніше generate_google_feed.py
      # не викликався в жодному workflow, тож own_product_links_cache.json
      # ніколи не існував на CI, і <url> в Rozetka-фіді назавжди лишався
      # порожнім. Steps одного job'у діляться файловою системою раннера —
      # цього достатньо, щоб наступні кроки прочитали щойно записаний кеш;
      # НЕ комітимо кеш у git (той самий підхід, що й для feeds/*.xml —
      # регенерується заново щоразу, а не зберігається між прогонами).
      # continue-on-error: <url> — необов'язковий тег, тож збій цього кроку
      # (напр. reverse-engineered пошуковий ендпоінт Prom тимчасово
      # недоступний) не повинен блокувати генерацію решти фідів, які раніше
      # чудово працювали й без нього.
      #
      # ВИПРАВЛЕНО (незалежне рев'ю PR #53, критична знахідка): цей крок
      # ПЕРЕНЕСЕНО СЮДИ, ПЕРЕД репрайсером — раніше йшов ПІСЛЯ нього, і
      # prom_competitor_pricer.py (buyBox-джерело конкурента, PR #53)
      # завжди отримував порожній own_product_links_cache.json (файл
      # фізично ще не існував на диску в момент його виконання), тож
      # buyBox НІКОЛИ не активувався в реальному CI — 100% прогонів мовчки
      # йшли на старий, менш надійний пошуковий fallback, попри те, що код
      # і локальні тести PR #53 були коректними. generate_google_feed.py
      # не залежить від результатів репрайсера чи від
      # prom_competitor_price_state.json, тож цей обмін місцями нічого
      # іншого не ламає.
      - name: Refresh own-product-link cache for Rozetka <url> tag and buyBox competitor lookup (best-effort)
        continue-on-error: true
        run: python generate_google_feed.py

      # ДОДАНО (2026-07-20, задачі #170/#171 власниці — видимість магазину):
      # generate_meta_feed.py/generate_bing_feed.py ЛИШЕ ЧИТАЮТЬ
      # own_product_links_cache.json, який щойно (крок вище) побудував
      # generate_google_feed.py — жодного власного ~970-запитового
      # self-match пошуку, щоб не потроїти навантаження на prom.ua в
      # тому самому прогоні. continue-on-error: той самий best-effort
      # статус, що й у Google/Rozetka <url> кроці вище — обидва фіди
      # необов'язкові, збій тут не повинен блокувати генерацію/
      # публікацію критичних Rozetka/Prom фідів нижче.
      - name: Generate Meta Commerce Manager feed (best-effort)
        continue-on-error: true
        run: python generate_meta_feed.py

      - name: Generate Bing Merchant Center feed (best-effort)
        continue-on-error: true
        run: python generate_bing_feed.py

      # continue-on-error: цей крок реально змінює ціни в Prom через API
      # (--apply) і опитує реверс-інженерний GraphQL-пошук — обидва є крихкими
      # зовнішніми залежностями. Збій тут не повинен зупиняти генерацію й
      # публікацію самих фідів (generate_*.py), які є основною метою workflow.
      # Власний гейт всередині скрипта (MIN_FULL_RUN_INTERVAL_HOURS) не дає
      # йому робити повний прогін частіше приблизно раз на добу, попри те, що
      # сам workflow тепер тригериться щочотири години.
      # github.event.inputs.* лише для workflow_dispatch (порожній рядок для
      # cron) — тому планові прогони завжди потрапляють у гілку "!= false",
      # тобто --apply без --force, і лише ручний dispatch може відхилятись.
      - name: Run competitor repricer (Prom)
        continue-on-error: true
        # SAFETY_HOLD (Надійність, п.3): repository variable, НЕ секрет —
        # умикається/вимикається однією командою (`gh variable set
        # SAFETY_HOLD --body "причина"` / `gh variable delete SAFETY_HOLD`),
        # без PR/мержу/чекання на CI, коли відомий баг безпеки виявлено, а
        # фікс ще не готовий. Порожнє значення (дефолт, змінна не задана)
        # не вмикає hold — перевірка truthy-рядка всередині скрипта.
        env:
          SAFETY_HOLD: ${{ vars.SAFETY_HOLD }}
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.apply }}" != "false" ]; then ARGS="$ARGS --apply"; fi
          if [ "${{ github.event.inputs.force }}" = "true" ]; then ARGS="$ARGS --force"; fi
          if [ "${{ github.event.inputs.force_circuit_breaker }}" = "true" ]; then ARGS="$ARGS --force-circuit-breaker"; fi
          python prom_competitor_pricer.py $ARGS

      # Фолбек на випадок, якщо репрайсер аварійно завершився ДО першого
      # виклику write_pricer_summary() (напр. не встиг навіть завантажити
      # PROM_API_KEY) — гарантує, що файл існує до кроку публікації, той
      # самий підхід, що й фолбек '{}' у кроці відновлення стану вище.
      - name: Ensure prom_competitor_pricer_summary.md exists (best-effort fallback)
        if: always()
        run: |
          if [ ! -s prom_competitor_pricer_summary.md ]; then
            printf '# Репрайсер конкурентів Prom — стислий підсумок (перезаписується щоразу)\n\nОновлено: %s\n⚠ Файл не згенеровано — репрайсер, ймовірно, аварійно завершився до першого запису підсумку.\n' \
              "$(date -u +'%Y-%m-%d %H:%M UTC')" > prom_competitor_pricer_summary.md
          fi

      # ВИПРАВЛЕНО (2026-07-20, задача власниці — "розділити публікацію
      # Rozetka/Prom фідів, щоб збій одного не блокував інший"): раніше цей
      # крок не мав continue-on-error — крах самого generate_rozetka_feed.py
      # (не лише його --preflight режиму нижче, який уже мав цей захист)
      # зупиняв УВЕСЬ job одразу тут, тож жоден із наступних, повністю
      # незалежних Prom-кроків (generate_prom_feed.py/generate_prom_feed_top.py)
      # ніколи навіть не запускався б того прогону. id: gen_rozetka дає
      # фолбек-кроку нижче змогу перевірити РЕАЛЬНИЙ результат саме цього
      # кроку (не лише --preflight).
      - name: Generate Rozetka feed
        id: gen_rozetka
        continue-on-error: true
        run: python generate_rozetka_feed.py

      # Задача власниці 2026-07-15: "системне рішення замість реактивних
      # патчів" — Rozetka заблокувала подачу через дублікати назв, які
      # потім виявились ширшою прогалиною (43 групи/116 SKU), не 2
      # одиничними випадками. rozetka_feed_preflight() зводить УСІ відомі
      # класи помилок валідатора в один прогін і виконується тут, ПІСЛЯ
      # генерації, ПЕРЕД публікацією нижче. НАВМИСНО без continue-on-error:
      # НАДІЙНІСТЬ, П.2 (2026-07-17): раніше ненульовий вихідний код тут
      # зупиняв ВЕСЬ job — усі наступні steps без `if: always()`
      # автоматично пропускались, тобто помилка ЛИШЕ в Rozetka-валідації
      # блокувала й генерацію/публікацію робочого Prom-фіда в тому ж
      # прогоні. Тепер continue-on-error: true — Prom-кроки нижче завжди
      # виконуються незалежно від результату Rozetka preflight. Замість
      # блокування всього job'у — окремий фолбек-крок нижче (Restore last
      # known-good rozetka_feed.xml) підміняє потенційно зламаний
      # rozetka_feed.xml на останню опубліковану РОБОЧУ версію, якщо
      # preflight провалився, — так публікація ніколи не понесе НЕвалідний
      # rozetka_feed.xml, і водночас ніколи не блокує Prom.
      - name: Rozetka feed preflight
        id: rozetka_preflight
        continue-on-error: true
        run: python generate_rozetka_feed.py --preflight

      # Умова розширена (2026-07-20) на steps.gen_rozetka.outcome — той самий
      # фолбек тепер покриває і крах САМОЇ генерації, не лише preflight.
      - name: Restore last known-good rozetka_feed.xml (generation or preflight failed this run)
        if: steps.gen_rozetka.outcome == 'failure' || steps.rozetka_preflight.outcome == 'failure'
        run: |
          echo "::error::Rozetka feed генерація або preflight провалились — публікую ОСТАННЮ РОБОЧУ версію rozetka_feed.xml замість щойно згенерованої, Prom-фіди публікуються незалежно."
          git fetch origin "$FEED_BRANCH" 2>/dev/null || true
          git show "origin/$FEED_BRANCH:feeds/rozetka_feed.xml" > feeds/rozetka_feed.xml 2>/dev/null || true
          python -c "
          from telegram_notify import send_telegram_message
          send_telegram_message(
              '⚠️ update-feeds.yml: генерація/preflight Rozetka-фіда провалились цього прогону — '
              'публікується попередня робоча версія rozetka_feed.xml (Prom-фіди йдуть '
              'своїм ходом, не заблоковані). Деталі: '
              'https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}'
          )
          "

      # ВИПРАВЛЕНО (2026-07-20, той самий запит — тепер симетрично для Prom):
      # раніше жоден з цих двох кроків не мав continue-on-error, тож крах
      # генерації Prom-фіда (напр. тимчасовий збій Toysi API) зупиняв job
      # ще ДО єдиного спільного кроку публікації нижче — тобто щойно успішно
      # згенерований і провалідований rozetka_feed.xml теж ніколи б не
      # опублікувався того прогону, попри те, що сам не мав жодної проблеми.
      - name: Generate Prom feed (full catalog)
        id: gen_prom_full
        continue-on-error: true
        run: python generate_prom_feed.py

      - name: Generate Prom feed (top-970)
        id: gen_prom_top
        continue-on-error: true
        run: python generate_prom_feed_top.py

      # Симетрично до Rozetka-фолбеку вище: якщо генерація Prom top-970
      # провалилась, підміняємо останньою робочою версією з feed-data,
      # замість того щоб publish-крок пропустив/затер файл на порожній.
      # prom_feed.xml (повний каталог) НЕ комітиться в git узагалі (>100МБ,
      # хоститься на VPS, окремий крок нижче) — для нього симетричний
      # захист інший: guard на непорожній файл перед rsync, див. коментар
      # біля "Upload prom_feed.xml to VPS" нижче.
      - name: Restore last known-good prom_feed_top.xml (generation failed this run)
        if: steps.gen_prom_top.outcome == 'failure'
        run: |
          echo "::error::Генерація prom_feed_top.xml провалилась — публікую ОСТАННЮ РОБОЧУ версію замість щойно згенерованої/відсутньої."
          git fetch origin "$FEED_BRANCH" 2>/dev/null || true
          git show "origin/$FEED_BRANCH:feeds/prom_feed_top.xml" > feeds/prom_feed_top.xml 2>/dev/null || true
          python -c "
          from telegram_notify import send_telegram_message
          send_telegram_message(
              '⚠️ update-feeds.yml: генерація prom_feed_top.xml провалилась цього прогону — '
              'публікується попередня робоча версія (Rozetka-фід йде своїм ходом, не заблокований). '
              'Деталі: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}'
          )
          "

      # Явна перевірка перед git-операціями: якщо TOYSI_API_KEY відсутній/невалідний
      # або каталог Toysi порожній, generate_*.py свідомо не пишуть файл (design decision
      # в самих скриптах) — раніше це тихо маскувалось старими закомодженими копіями
      # feeds/*.xml на master, тепер (після git-гігієни, коміт 72ad9fd) фолбеку немає,
      # тож без цієї перевірки помилка виглядає як незрозумілий git pathspec-фейл.
      #
      # ЗВУЖЕНО (2026-07-20, той самий запит про ізоляцію збоїв Rozetka/Prom):
      # prom_feed.xml прибрано з цього списку — на відміну від двох інших файлів,
      # у нього НЕМАЄ git-фолбеку (не комітиться, >100МБ, VPS-хостинг), тож його
      # відсутність тут раніше блокувала ЦІЛИЙ job (exit 1, без continue-on-error) —
      # тобто щойно згенеровані/фолбек-відновлені rozetka_feed.xml і prom_feed_top.xml
      # так і не публікувались через збій ОКРЕМОГО, непов'язаного файлу. Власна
      # перевірка непорожності prom_feed.xml тепер лише в "Upload prom_feed.xml to
      # VPS" вище, де вона й блокує ЛИШЕ той крок, не решту job'у.
      - name: Verify feeds were generated
        run: |
          for f in feeds/rozetka_feed.xml feeds/prom_feed_top.xml; do
            if [ ! -s "$f" ]; then
              echo "::error::$f не згенеровано (порожній файл або відсутній, і фолбек з feed-data теж не спрацював — ймовірно, перший запуск до існування гілки feed-data) — ймовірно, TOYSI_API_KEY secret відсутній/невалідний, або Toysi API недоступний. Перевір Settings -> Secrets and variables -> Actions."
              exit 1
            fi
          done

      # ВИПРАВЛЕНО 2026-07-14: prom_feed.xml (повний каталог, 106+ МБ) остаточно
      # перенесено з git на VPS-хостинг — GitHub-як-хостинг для цього файлу
      # вичерпав себе (жорсткий ліміт 100 МБ/файл, публікація падала щоразу з
      # 13.07, див. видалений нижче трирівневий фолбек). SSH-ключ (ТІЛЬКИ
      # rsync у /opt/plutustoys/feeds/, обмежено через rrsync — навіть при
      # витоку ключа неможливо виконати довільну команду на VPS) — новий
      # секрет FEED_DEPLOY_SSH_KEY, зареєстрований 2026-07-14. continue-on-error:
      # VPS/мережа — зовнішня залежність, збій тут не повинен блокувати
      # публікацію rozetka_feed.xml/prom_feed_top.xml нижче, які й далі йдуть
      # у git (обидва помітно менші за 100 МБ, ще жоден пуш ними не впав).
      #
      # ВИПРАВЛЕНО 2026-07-14 (фолоу-ап з рев'ю pt5): ключ більше не дає
      # доступу до root — окремий системний користувач feeddeploy на VPS,
      # власник /opt/plutustoys/feeds, той самий rrsync-forced-command,
      # обмежений тим самим каталогом. Компрометація ключа тепер обмежена
      # одним каталогом, а не всією системою.
      - name: Upload prom_feed.xml to VPS (permanent hosting)
        id: vps_upload
        continue-on-error: true
        run: |
          # ДОДАНО (2026-07-20, той самий запит про ізоляцію збоїв Rozetka/Prom):
          # prom_feed.xml НЕ комітиться в git (>100МБ) і тому не має git-based
          # фолбеку, як rozetka_feed.xml/prom_feed_top.xml вище — якщо
          # generate_prom_feed.py (id: gen_prom_full) провалився, локальний
          # файл може бути відсутнім АБО (гірше) порожнім 0-байтовим. Без цього
          # guard'а rsync мовчки перезаписав би РОБОЧИЙ файл на VPS порожнім —
          # тому явна перевірка ПЕРЕД rsync, не покладаємось лише на те, що
          # rsync сам відмовиться синкати відсутній source.
          if [ ! -s feeds/prom_feed.xml ]; then
            echo "::error::feeds/prom_feed.xml відсутній або порожній (генерація, ймовірно, провалилась) — НЕ вивантажую на VPS, щоб не затерти робочу версію порожньою."
            exit 1
          fi
          mkdir -p ~/.ssh
          echo "${{ secrets.FEED_DEPLOY_SSH_KEY }}" > ~/.ssh/feed_deploy_key
          chmod 600 ~/.ssh/feed_deploy_key
          ssh-keyscan -H "${{ secrets.FEED_DEPLOY_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null
          # Явний користувач ОБОВ'ЯЗКОВИЙ тут: без нього rsync/ssh підставляє
          # ім'я ПОТОЧНОГО користувача на раннері (на ubuntu-latest це
          # буквально "runner") як SSH-логін — VPS такого користувача не
          # має, і автентифікація падає з "Invalid user runner" (живо
          # підтверджено в /var/log/auth.log на VPS during діагностики
          # 2026-07-14).
          rsync -avz --timeout=180 \
            -e "ssh -i ~/.ssh/feed_deploy_key -o StrictHostKeyChecking=yes -o UserKnownHostsFile=~/.ssh/known_hosts" \
            feeds/prom_feed.xml "feeddeploy@${{ secrets.FEED_DEPLOY_HOST }}:prom_feed.xml"

      # continue-on-error: true вище означає, що збій цього кроку НЕ провалює
      # job і показує лише пасивний жовтий трикутник в UI Actions (той самий
      # клас прогалини, що вже позначався в pt63/pt5) — а файл тепер
      # критичний для імпорту в Prom. steps.vps_upload.outcome (не .conclusion,
      # яке завжди "success" через continue-on-error) відображає РЕАЛЬНИЙ
      # результат кроку.
      - name: Notify on VPS upload failure
        if: steps.vps_upload.outcome == 'failure'
        continue-on-error: true
        run: |
          echo "::error::Вивантаження prom_feed.xml на VPS не вдалось — файл на VPS міг застаріти. Перевір run ${{ github.run_id }}."
          python -c "
          from telegram_notify import send_telegram_message
          send_telegram_message(
              '🚨 update-feeds.yml: вивантаження prom_feed.xml на VPS не вдалось. '
              'Файл на VPS може бути застарілим, доки не буде виправлено. '
              'Деталі: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}'
          )
          "

      # Публікуємо rozetka_feed.xml + prom_feed_top.xml в окрему гілку feed-data
      # одним коммітом, що щоразу перезаписує попередній (force-push). Це не
      # дає git-історії рости на кожен запуск (кожні 4 години) — інакше
      # репозиторій накопичував би десятки МБ щодня назавжди. Гілка main
      # лишається чистою — тільки код.
      #
      # НАДІЙНІСТЬ, П.2 (2026-07-17): цей крок тепер ЗАВЖДИ доходить сюди й
      # публікує ОБИДВА фіди — Rozetka preflight вище більше НЕ блокує job
      # (continue-on-error: true), а замінює потенційно зламаний
      # rozetka_feed.xml на останню робочу версію при провалі. Тобто помилка
      # ЛИШЕ в Rozetka-валідації більше не заважає щойно згенерованому,
      # робочому Prom-фіду публікуватись цього ж прогону.
      #
      # ВИПРАВЛЕНО 2026-07-14: prom_feed.xml (106+ МБ, понад жорсткий ліміт
      # GitHub 100 МБ/файл) прибрано з цієї публікації повністю — окремий крок
      # вище вивантажує його на постійний VPS-хостинг замість git. Трирівневий
      # фолбек (2026-07-12, коміт 6385d7e і далі), що existed саме через
      # ризик перевищення ліміту цим файлом, більше не потрібен: без
      # prom_feed.xml сумарний розмір цієї публікації — одноразовий, надійно
      # закладений під ліміт, жодного окремого файлу біля межі 100 МБ немає.
      - name: Publish feeds to ${{ env.FEED_BRANCH }} (force-push, no history)
        run: |
          git config user.name "feed-bot"
          git config user.email "feed-bot@users.noreply.github.com"
          git checkout --orphan "$FEED_BRANCH-tmp"
          git rm -r --cached . > /dev/null 2>&1 || true
          # -f: feeds/*.xml навмисно в .gitignore для master (щоб не роздувати її
          # історію), але саме ці файли й мають бути закомічені сюди, на feed-data —
          # без -f git add мовчки відмовляється додавати файли, що збігаються з .gitignore.
          git add -f feeds/rozetka_feed.xml feeds/prom_feed_top.xml prom_competitor_price_state.json rozetka_feed_membership_state.json
          # Видимість, п.1 (2026-07-17): Google Merchant феєд (топ-970, малий,
          # той самий порядок розміру, що prom_feed_top.xml — жодного ризику
          # ліміту 100МБ) досі ніколи не публікувався сюди, попри те, що
          # generate_google_feed.py вже виконується вище щоразу — стабільного
          # публічного URL не існувало, власниця не могла подати феєд у Google
          # Merchant Center. Кроком-джерелом навмисно лишається best-effort
          # (continue-on-error: true, рядок вище "Refresh own-product-link
          # cache..." — той самий крок генерує і цей файл) — тому файл тут
          # додається, лише якщо реально існує й непорожній: якщо
          # reverse-engineered self-match/self-lookup цього прогону впав,
          # публікація решти (критичних) фідів все одно не має заблокуватись
          # відсутнім pathspec для git add.
          if [ -s feeds/google_merchant_feed.xml ]; then
            git add -f feeds/google_merchant_feed.xml
          else
            echo "::warning::feeds/google_merchant_feed.xml відсутній/порожній цього прогону — Google-феєд НЕ опубліковано (решта фідів публікуються як завжди)."
          fi
          # Задачі #170/#171 (2026-07-20): той самий best-effort/умовний
          # git add, що й для google_merchant_feed.xml вище — обидва нові
          # феєди best-effort (continue-on-error), тож можуть бути
          # відсутні/порожні окремо від решти публікації.
          if [ -s feeds/meta_feed.xml ]; then
            git add -f feeds/meta_feed.xml
          else
            echo "::warning::feeds/meta_feed.xml відсутній/порожній цього прогону — Meta-феєд НЕ опубліковано (решта фідів публікуються як завжди)."
          fi
          if [ -s feeds/bing_feed.xml ]; then
            git add -f feeds/bing_feed.xml
          else
            echo "::warning::feeds/bing_feed.xml відсутній/порожній цього прогону — Bing-феєд НЕ опубліковано (решта фідів публікуються як завжди)."
          fi
          git commit -m "Feed update $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push --force origin "$FEED_BRANCH-tmp:$FEED_BRANCH"

      # Приватний артефакт (не публічна гілка feed-data): prom_competitor_
      # pricer_summary.md містить стратегічні лічильники репрайсера
      # (перевірено/скориговано/delist/ритм гейту) — той самий тип сигналу
      # про ціноутворення, який раніше вирішили не публікувати відкрито.
      # Доступ лише через автентифікований `gh run download` або UI Actions
      # власника, ніколи публічно. retention 14 днів — це лише "останній
      # знімок", попередні прогони не потрібні довше цього.
      - name: Upload pricer summary as private artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prom-competitor-pricer-summary
          path: prom_competitor_pricer_summary.md
          retention-days: 14
